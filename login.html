<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — HoldPay</title>
<link rel="stylesheet" href="css/main.css">
<style>
.auth-wrap {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 40px 16px; position: relative; z-index: 1;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; width: 100%; max-width: 440px;
}
.auth-logo {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.auth-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.auth-sub { font-size: 13px; color: var(--muted2); margin-bottom: 28px; }
.input-group { margin-bottom: 16px; }
.auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted2); }
.auth-switch a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div id="nav" data-page="login"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">HoldPay</div>
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Login to your HoldPay wallet</div>

    <div class="input-group">
      <label class="input-label">EMAIL ADDRESS</label>
      <input type="email" class="input" id="loginEmail" placeholder="you@example.com" />
    </div>

    <div class="input-group">
      <label class="input-label">PASSWORD</label>
      <input type="password" class="input" id="loginPassword" placeholder="Your password" />
    </div>

    <button class="btn btn-primary btn-lg" onclick="doLogin()" style="width:100%; justify-content:center; margin-top:8px;">
      Login to Dashboard →
    </button>

    <div id="loginError" style="margin-top:12px; font-size:12px; color:var(--accent2); display:none;"></div>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script src="js/holdpay.js"></script>
<script>
if (HP.isLoggedIn()) window.location.href = 'dashboard.html';

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  const savedEmail = HP.getUserEmail();
  const savedPass = localStorage.getItem('hp_user_password');

  if (!email || !password) { showErr('Please fill all fields'); return; }
  if (email !== savedEmail || btoa(password) !== savedPass) {
    showErr('Invalid email or password'); return;
  }

  window.location.href = 'dashboard.html';
}

function showErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
