<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — HoldPay</title>
<link rel="stylesheet" href="css/main.css">
<style>
.auth-wrap {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 40px 16px; position: relative; z-index: 1;
}

.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; width: 100%; max-width: 440px;
}

.auth-logo {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.auth-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.auth-sub { font-size: 13px; color: var(--muted2); margin-bottom: 28px; }

.input-group { margin-bottom: 16px; }

.divider-text {
  text-align: center; color: var(--muted); font-size: 12px;
  margin: 20px 0; position: relative;
}
.divider-text::before, .divider-text::after {
  content: ''; position: absolute; top: 50%; width: 40%;
  height: 1px; background: var(--border);
}
.divider-text::before { left: 0; }
.divider-text::after { right: 0; }

.auth-switch {
  text-align: center; margin-top: 20px;
  font-size: 13px; color: var(--muted2);
}
.auth-switch a { color: var(--accent); text-decoration: none; }

.success-card {
  text-align: center; padding: 20px;
  display: none;
}
.success-icon { font-size: 48px; margin-bottom: 16px; }
.success-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.success-sub { font-size: 13px; color: var(--muted2); }
</style>
</head>
<body>
<div id="nav" data-page="signup"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">HoldPay</div>

    <!-- SIGNUP FORM -->
    <div id="signupForm">
      <div class="auth-title">Create Account</div>
      <div class="auth-sub">Email only. No bank, no ID, no KYC. 30 seconds.</div>

      <div class="input-group">
        <label class="input-label">FULL NAME</label>
        <input type="text" class="input" id="signupName" placeholder="Your name" />
      </div>

      <div class="input-group">
        <label class="input-label">EMAIL ADDRESS</label>
        <input type="email" class="input" id="signupEmail" placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label class="input-label">PASSWORD</label>
        <input type="password" class="input" id="signupPassword" placeholder="Min 8 characters" />
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer;">
          <input type="checkbox" id="signupAgree" style="margin-top:3px;" />
          <span style="font-size:12px; color:var(--muted2);">I agree to the Terms of Service and understand that HoldPay is not a bank and funds are held in crypto (USDC/USDT)</span>
        </label>
      </div>

      <button class="btn btn-primary btn-lg" id="signupBtn" onclick="doSignup()" style="width:100%; justify-content:center;">
        Create Free Account →
      </button>

      <div id="signupError" style="margin-top:12px; font-size:12px; color:var(--accent2); display:none;"></div>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>

    <!-- SUCCESS -->
    <div class="success-card" id="successCard">
      <div class="success-icon">🎉</div>
      <div class="success-title">Account Created!</div>
      <div class="success-sub" style="margin-bottom:20px;">Welcome to HoldPay. Your wallet is being set up...</div>
      <div class="loader" style="margin: 0 auto;"></div>
    </div>
  </div>
</div>

<script src="js/holdpay.js"></script>
<script>
// Redirect if already logged in
if (HP.isLoggedIn()) {
  window.location.href = 'dashboard.html';
}

async function doSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const agree = document.getElementById('signupAgree').checked;
  const errEl = document.getElementById('signupError');

  errEl.style.display = 'none';

  if (!name) { showErr('Please enter your name'); return; }
  if (!email || !email.includes('@')) { showErr('Please enter a valid email'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters'); return; }
  if (!agree) { showErr('Please agree to the terms'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    // Create user locally
    const userId = HP.genId();
    HP.saveUser(userId, email);
    localStorage.setItem('hp_user_name', name);
    localStorage.setItem('hp_user_password', btoa(password));

    // Show success
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';

    // Initialize wallet
    setTimeout(() => {
      HP.saveBalance(0);
      HP.saveTransaction({
        type: 'system',
        description: 'Account created — wallet initialized',
        amount: 0,
        status: 'completed'
      });
      window.location.href = 'dashboard.html?new=1';
    }, 2000);

  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'Create Free Account →';
  }
}

function showErr(msg) {
  const el = document.getElementById('signupError');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
